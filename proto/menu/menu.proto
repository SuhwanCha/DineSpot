syntax = "proto3";

package menu.v1;

option go_package = "github.com/dinespot/backend/internal/gen/menu/v1;menuv1";

import "google/protobuf/timestamp.proto";

// ─── Enums ───────────────────────────────────────────────────

enum MenuItemStatus {
  MENU_ITEM_STATUS_UNSPECIFIED = 0;
  MENU_ITEM_STATUS_ACTIVE      = 1;  // 판매 중
  MENU_ITEM_STATUS_INACTIVE    = 2;  // 비활성 (메뉴판에서 숨김)
}

enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED     = 0;
  ORDER_STATUS_PENDING         = 1;  // 주문 생성, 결제 대기
  ORDER_STATUS_CONFIRMED       = 2;  // 결제 완료, 주문 확정
  ORDER_STATUS_PAYMENT_PENDING = 3;  // 결제 실패 후 재결제 대기
  ORDER_STATUS_CANCELLED       = 4;  // 주문 취소
}

// ─── Entities ────────────────────────────────────────────────

message MenuItem {
  string id            = 1;
  string restaurant_id = 2;

  // 메뉴 카테고리 (예: "메인", "사이드", "음료")
  string category = 3;

  string name        = 4;
  int64  price       = 5;  // 원 단위 정수
  string description = 6;
  string image_url   = 7;

  // 재고 수량. -1은 무제한.
  int32 stock = 8;

  // 품절 여부 (stock=0일 때 자동 true)
  bool is_sold_out = 9;

  MenuItemStatus status     = 10;
  int32          sort_order = 11;  // 메뉴판 노출 순서 (낮을수록 먼저)

  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
}

message OrderItem {
  string menu_item_id = 1;
  int32  quantity     = 2;

  // 주문 시점의 단가 (이후 가격 변동에 영향받지 않음)
  int64 unit_price = 3;
}

message Order {
  string   id             = 1;
  string   reservation_id = 2;
  string   customer_id    = 3;
  repeated OrderItem items = 4;
  int64    total_amount   = 5;  // 원 단위
  OrderStatus status      = 6;

  // 멱등키 (중복 주문 방지)
  string idempotency_key = 7;

  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

// ─── Request / Response ──────────────────────────────────────

message UpsertMenuItemRequest {
  string restaurant_id = 1;

  // 빈 문자열이면 신규 생성, 값이 있으면 해당 ID 업데이트
  string item_id = 2;

  string         category   = 3;
  string         name       = 4;
  int64          price      = 5;  // 음수 불가
  string         description = 6;
  int32          stock       = 7;  // -1 = 무제한
  MenuItemStatus status      = 8;
  int32          sort_order  = 9;
}

message UpsertMenuItemResponse {
  string menu_item_id = 1;
}

// ──

message ListMenuItemsRequest {
  string restaurant_id = 1;

  // true이면 INACTIVE 항목도 포함 (점주 관리 화면용)
  bool include_inactive = 2;
}

message ListMenuItemsResponse {
  repeated MenuItem items = 1;
}

// ──

message GetMenuItemRequest {
  string menu_item_id = 1;
}

message GetMenuItemResponse {
  MenuItem item = 1;
}

// ──

message PlacePreOrderRequest {
  string             reservation_id  = 1;
  repeated OrderItem items           = 2;

  // UUID v4. 동일 키 재요청 시 기존 결과 반환.
  string idempotency_key = 3;
}

message PlacePreOrderResponse {
  string      order_id     = 1;
  OrderStatus status       = 2;
  int64       total_amount = 3;

  // PAYMENT_PENDING 상태일 때 결제 진행 URL
  string payment_url = 4;
}

// ──

message GetOrderRequest {
  string order_id = 1;
}

message GetOrderResponse {
  Order order = 1;
}

// ─── Service ─────────────────────────────────────────────────

service MenuService {
  // ── 점주용 ──────────────────────────────────────────────────

  // 메뉴 아이템 등록/수정 (UPSERT)
  rpc UpsertMenuItem (UpsertMenuItemRequest) returns (UpsertMenuItemResponse);

  // ── 공용 ────────────────────────────────────────────────────

  // 메뉴 목록 조회 (고객: ACTIVE만, 점주: 전체)
  rpc ListMenuItems (ListMenuItemsRequest) returns (ListMenuItemsResponse);

  // 메뉴 아이템 단건 조회
  rpc GetMenuItem (GetMenuItemRequest) returns (GetMenuItemResponse);

  // ── 고객용 ──────────────────────────────────────────────────

  // 예약 확정 후 메뉴 사전 주문 + 결제 요청
  rpc PlacePreOrder (PlacePreOrderRequest) returns (PlacePreOrderResponse);

  // 주문 조회
  rpc GetOrder (GetOrderRequest) returns (GetOrderResponse);
}
