name: Telegram Notifications

on:
  push:
    branches: ["**"]
  pull_request:
    types: [opened, closed, reopened, synchronize]
  issues:
    types: [opened, closed, reopened]
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Set message for push
        if: github.event_name == 'push'
        run: |
          BRANCH="${{ github.ref_name }}"
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1 | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
          AUTHOR=$(echo "${{ github.event.head_commit.author.name }}" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
          COMPARE_URL="${{ github.event.compare }}"
          {
            echo "MESSAGE<<EOF"
            echo "📦 <b>Push</b> to <code>${BRANCH}</code>"
            echo "👤 ${AUTHOR}"
            echo "💬 ${COMMIT_MSG}"
            echo "🔗 <a href=\"${COMPARE_URL}\">변경사항 보기</a>"
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Set message for PR opened/reopened
        if: github.event_name == 'pull_request' && (github.event.action == 'opened' || github.event.action == 'reopened')
        run: |
          {
            echo "MESSAGE<<EOF"
            echo "🔀 <b>PR 오픈</b>: ${{ github.event.pull_request.title }}"
            echo "👤 ${{ github.event.pull_request.user.login }}"
            echo "🔗 <a href=\"${{ github.event.pull_request.html_url }}\">PR 보기</a>"
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Set message for PR merged
        if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
        run: |
          {
            echo "MESSAGE<<EOF"
            echo "✅ <b>PR 머지됨</b>: ${{ github.event.pull_request.title }}"
            echo "👤 ${{ github.event.pull_request.user.login }}"
            echo "🔗 <a href=\"${{ github.event.pull_request.html_url }}\">PR 보기</a>"
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Set message for PR closed (not merged)
        if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == false
        run: |
          {
            echo "MESSAGE<<EOF"
            echo "❌ <b>PR 닫힘</b>: ${{ github.event.pull_request.title }}"
            echo "👤 ${{ github.event.pull_request.user.login }}"
            echo "🔗 <a href=\"${{ github.event.pull_request.html_url }}\">PR 보기</a>"
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Set message for issue opened
        if: github.event_name == 'issues' && github.event.action == 'opened'
        run: |
          {
            echo "MESSAGE<<EOF"
            echo "🐛 <b>이슈 생성</b>: ${{ github.event.issue.title }}"
            echo "👤 ${{ github.event.issue.user.login }}"
            echo "🔗 <a href=\"${{ github.event.issue.html_url }}\">이슈 보기</a>"
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Set message for issue closed
        if: github.event_name == 'issues' && github.event.action == 'closed'
        run: |
          {
            echo "MESSAGE<<EOF"
            echo "🔒 <b>이슈 닫힘</b>: ${{ github.event.issue.title }}"
            echo "👤 ${{ github.event.issue.user.login }}"
            echo "🔗 <a href=\"${{ github.event.issue.html_url }}\">이슈 보기</a>"
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Set message for release
        if: github.event_name == 'release'
        run: |
          {
            echo "MESSAGE<<EOF"
            echo "🚀 <b>새 릴리즈</b>: ${{ github.event.release.tag_name }}"
            echo "📝 ${{ github.event.release.name }}"
            echo "🔗 <a href=\"${{ github.event.release.html_url }}\">릴리즈 보기</a>"
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Send Telegram notification
        if: env.MESSAGE != ''
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=${MESSAGE}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true"
