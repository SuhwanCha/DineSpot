name: Telegram Notifications

on:
  push:
    branches: ["**"]
  pull_request:
    types: [opened, closed, reopened, synchronize]
  issues:
    types: [opened, closed, reopened]
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Set message for push
        if: github.event_name == 'push'
        run: |
          BRANCH="${{ github.ref_name }}"
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          AUTHOR="${{ github.event.head_commit.author.name }}"
          COMPARE_URL="${{ github.event.compare }}"
          echo "MESSAGE=📦 *Push* to \`${BRANCH}\`%0A👤 ${AUTHOR}%0A💬 ${COMMIT_MSG}%0A🔗 [변경사항 보기](${COMPARE_URL})" >> $GITHUB_ENV

      - name: Set message for PR opened/reopened
        if: github.event_name == 'pull_request' && (github.event.action == 'opened' || github.event.action == 'reopened')
        run: |
          echo "MESSAGE=🔀 *PR 오픈*: ${{ github.event.pull_request.title }}%0A👤 ${{ github.event.pull_request.user.login }}%0A🔗 [PR 보기](${{ github.event.pull_request.html_url }})" >> $GITHUB_ENV

      - name: Set message for PR merged
        if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
        run: |
          echo "MESSAGE=✅ *PR 머지됨*: ${{ github.event.pull_request.title }}%0A👤 ${{ github.event.pull_request.user.login }}%0A🔗 [PR 보기](${{ github.event.pull_request.html_url }})" >> $GITHUB_ENV

      - name: Set message for PR closed (not merged)
        if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == false
        run: |
          echo "MESSAGE=❌ *PR 닫힘*: ${{ github.event.pull_request.title }}%0A👤 ${{ github.event.pull_request.user.login }}%0A🔗 [PR 보기](${{ github.event.pull_request.html_url }})" >> $GITHUB_ENV

      - name: Set message for issue opened
        if: github.event_name == 'issues' && github.event.action == 'opened'
        run: |
          echo "MESSAGE=🐛 *이슈 생성*: ${{ github.event.issue.title }}%0A👤 ${{ github.event.issue.user.login }}%0A🔗 [이슈 보기](${{ github.event.issue.html_url }})" >> $GITHUB_ENV

      - name: Set message for issue closed
        if: github.event_name == 'issues' && github.event.action == 'closed'
        run: |
          echo "MESSAGE=🔒 *이슈 닫힘*: ${{ github.event.issue.title }}%0A👤 ${{ github.event.issue.user.login }}%0A🔗 [이슈 보기](${{ github.event.issue.html_url }})" >> $GITHUB_ENV

      - name: Set message for release
        if: github.event_name == 'release'
        run: |
          echo "MESSAGE=🚀 *새 릴리즈*: ${{ github.event.release.tag_name }}%0A📝 ${{ github.event.release.name }}%0A🔗 [릴리즈 보기](${{ github.event.release.html_url }})" >> $GITHUB_ENV

      - name: Send Telegram notification
        if: env.MESSAGE != ''
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${{ env.MESSAGE }}" \
            -d "parse_mode=Markdown" \
            -d "disable_web_page_preview=true"
